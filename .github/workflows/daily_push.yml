name: 每日A股复盘推送

on:
  # 每个交易日 12:00 和 18:00（北京时间）
  schedule:
    - cron: '0 4 * * 1-5'   # UTC 04:00 = 北京时间 12:00
    - cron: '0 10 * * 1-5'  # UTC 10:00 = 北京时间 18:00

  # 手动触发
  workflow_dispatch:

concurrency:
  group: daily-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install akshare requests exchange-calendars

      - name: 执行推送
        env:
          SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python daily_push.py
